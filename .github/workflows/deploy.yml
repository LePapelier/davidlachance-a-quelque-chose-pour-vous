name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Déclenchement manuel depuis l'UI GitHub

# Permissions pour le token GITHUB_TOKEN
permissions:
  contents: write
  pages: write
  id-token: write

# Autoriser un seul déploiement concurrent
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Debug - Check Node.js version
        run: node --version && npm --version
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Debug - List dist directory
        run: ls -la dist/ && echo "---" && find dist/ -type f | head -20
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Si tu veux utiliser un domaine personnalisé, décommente la ligne suivante
          # cname: example.com